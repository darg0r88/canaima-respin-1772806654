name: Respin Canaima ISO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y squashfs-tools xorriso kpartx mtools 7zip wget curl

      - name: Download Tools & ISO
        run: |
          # Descargar isorespin.sh desde el enlace de Google Drive proporcionado
          curl -L "https://drive.usercontent.google.com/download?id=0B99O3A0dDe67S053UE8zN3NwM2c&export=download" -o isorespin.sh
          chmod +x isorespin.sh

          # Descargar Lubuntu 20.04.5 LTS desde el enlace proporcionado
          wget -c --retry-connrefused --tries=10 --user-agent="Mozilla/5.0" \
            "https://cdimage.ubuntu.com/lubuntu/releases/20.04.5/release/lubuntu-20.04.5-desktop-amd64.iso" -O original.iso

      - name: Patch ISO (The Magic)
        run: |
          # Parcheamos para Intel Atom Z3735F (32-bit UEFI + RTL8723BS WiFi)
          sudo ./isorespin.sh -i original.iso \
            --atom \
            -u \
            -c "echo 'intel_idle.max_cstate=1' >> /etc/default/grub"

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: canaima-lubuntu-iso
          path: linuxium-*.iso
          retention-days: 3
