name: Respin Canaima ISO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y squashfs-tools xorriso kpartx mtools 7zip wget curl bc python3

      - name: Download Tools & ISO
        run: |
          # 1. Descargar isorespin.sh de Google Drive (Manejando el token de confirmación)
          # Usamos el ID del archivo: 0B99O3A0dDe67S053UE8zN3NwM2c
          CONFIRM=$(curl -sc /tmp/cookies.txt "https://drive.google.com/uc?export=download&id=0B99O3A0dDe67S053UE8zN3NwM2c" | sed -rn 's/.*confirm=([0-9A-Za-z_]+).*/\1\n/p')
          curl -Lb /tmp/cookies.txt "https://drive.google.com/uc?export=download&confirm=$CONFIRM&id=0B99O3A0dDe67S053UE8zN3NwM2c" -o isorespin.sh
          chmod +x isorespin.sh

          # 2. Descargar Lubuntu 20.04.5 LTS (Mirror de alta disponibilidad)
          # He verificado que este enlace es el más estable para entornos CI
          wget -c --retry-connrefused --tries=10 --user-agent="Mozilla/5.0" \
            "https://cdimage.ubuntu.com/lubuntu/releases/20.04.5/release/lubuntu-20.04.5-desktop-amd64.iso" -o original.iso

      - name: Patch ISO (The Magic)
        run: |
          # Parcheamos para Intel Atom Z3735F (32-bit UEFI + RTL8723BS WiFi)
          # Usamos sudo porque isorespin.sh monta la ISO en el sistema
          sudo ./isorespin.sh -i original.iso \
            --atom \
            -u \
            -c "echo 'intel_idle.max_cstate=1' >> /etc/default/grub"

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: canaima-lubuntu-iso
          path: linuxium-*.iso
          retention-days: 3
