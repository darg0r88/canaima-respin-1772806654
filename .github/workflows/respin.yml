name: Respin Canaima ISO

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y squashfs-tools xorriso kpartx mtools 7zip wget curl

      - name: Download Tools & ISO
        run: |
          # Descargar isorespin.sh
          wget -c "https://goo.gl/Y8vS95" -O isorespin.sh
          chmod +x isorespin.sh

          # Descargar Lubuntu 22.04 LTS (64-bit)
          wget -c "https://cdimage.ubuntu.com/lubuntu/releases/22.04/release/lubuntu-22.04.5-desktop-amd64.iso" -O original.iso

      - name: Patch ISO (The Magic)
        run: |
          # Parcheamos para Intel Atom Z3735F (32-bit UEFI + RTL8723BS WiFi)
          sudo ./isorespin.sh -i original.iso \
            --atom \
            -u \
            -c "echo 'intel_idle.max_cstate=1' >> /etc/default/grub"

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: canaima-lubuntu-iso
          path: linuxium-*.iso
          retention-days: 3
